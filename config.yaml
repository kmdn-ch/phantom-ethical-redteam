# ================== CONFIGURATION PHANTOM ==================
#
# provider: anthropic | openai | grok | gemini | ollama | mistral | deepseek
provider: "ollama"

# model: leave empty to use the provider's default (as of 2026-03-15)
#   anthropic -> claude-sonnet-4-6
#   openai    -> gpt-5.4
#   grok      -> grok-4-20-beta
#   gemini    -> gemini-3.0-pro
#   ollama    -> deepseek-v3.2:cloud  (local)
#   mistral   -> mistral-large-latest
#   deepseek  -> deepseek-chat-v3.2
model: "deepseek-v3.2:cloud"

# API key -- set via environment variable or generated by install.sh / install.ps1
api_key: ""

# Ollama only
ollama_host: "http://localhost:11434"

# Paths
log_dir: "logs"
scope_file: "scopes/current_scope.md"

# Behaviour
debug: false
autonomous: true
max_autonomous_turns: 50
pause_every_n_turns: 10

# Interactive mode
interactive: true

# Timeouts (seconds)
sqlmap_timeout: 300
nmap_timeout: 300

# Ollama LLM timeout (seconds) -- local models may need more time
ollama_timeout: 300

# Metasploit timeout (seconds) -- exploits may need time to run
metasploit_timeout: 120

# Parallel tool execution
max_parallel_tools: 4

# Rate limiting for HTTP requests (requests/sec)
requests_per_second: 5

# Retry config for HTTP tools (recon, payloads)
retry_max: 3
retry_backoff: 2

# Context compaction -- tool results older than this many turns are truncated
context_compact_after: 5

# Stall detection -- inject pivot guidance after N turns with no new findings
stall_threshold: 5

# Stealth profile: silent | stealthy | normal | aggressive
stealth_profile: "normal"

# HTTP proxy for all tool requests (optional, e.g. Burp Suite)
# proxy: "http://127.0.0.1:8080"
