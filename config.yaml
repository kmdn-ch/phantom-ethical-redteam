# ================== CONFIGURATION PHANTOM - ETHICAL REDTEAM ==================
# API key : export ANTHROPIC_API_KEY=sk-ant-...
# Ne jamais stocker la clé ici — utiliser la variable d'environnement.
anthropic_api_key: ""

model: "claude-3-5-sonnet-20241022"
max_tokens: 8192
temperature: 0.0

# Folders
log_dir: "logs"
scope_file: "scopes/current_scope.md"

# Mode debug (True = displays everything, False = only final results)
debug: true
autonomous: true
max_autonomous_turns: 50
pause_every_n_turns: 10
